const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const FRAME_COUNT = 7;
const SPRITE_W = 110;
const SPRITE_H = 128;
const SCALE = 1.5;
const DRAW_W = SPRITE_W * SCALE;
const DRAW_H = SPRITE_H * SCALE;
const SPRITE_X = 30;
const SPRITE_Y = (canvas.height - DRAW_H) / 2;

let frame = 0;
let playing = false;
let looping = true;
let fps = 8;
let lastTime = 0;
let slashes = [];
let screenShake = { x: 0, y: 0, intensity: 0 };
let flashAlpha = 0;
let chargeParticles = [];
let afterImages = [];
let groundWaves = [];
let lightningBolts = [];
let ambientParticles = [];
let timeDistortion = 0;

const offscreen = document.createElement('canvas');
offscreen.width = 768;
offscreen.height = 128;
const offCtx = offscreen.getContext('2d');

const img = new Image();
img.src = SPRITE_DATA;
img.onload = () => {
  offCtx.drawImage(img, 0, 0);
  const imageData = offCtx.getImageData(0, 0, 768, 128);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    if (r < 30 && g < 30 && b < 30) {
      data[i+3] = 0;
    } else if (r < 60 && g < 60 && b < 60) {
      const brightness = Math.max(r, g, b);
      data[i+3] = Math.floor((brightness / 60) * 255);
    }
  }
  offCtx.putImageData(imageData, 0, 0);
};

// Spawn ambient floating particles
function spawnAmbientParticles() {
  for (let i = 0; i < 3; i++) {
    ambientParticles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -Math.random() * 0.5 - 0.2,
      life: 1.0,
      size: Math.random() * 2.5 + 0.8,
      hue: 220 + Math.random() * 30,
      trail: []
    });
  }
}

function spawnChargeEffect() {
  const cx = SPRITE_X + DRAW_W * 0.5;
  const cy = SPRITE_Y + DRAW_H * 0.5;
  for (let i = 0; i < 35; i++) {
    const ang = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 100;
    chargeParticles.push({
      x: cx + Math.cos(ang) * dist,
      y: cy + Math.sin(ang) * dist,
      tx: cx + (Math.random() - 0.5) * 20,
      ty: cy + (Math.random() - 0.5) * 20,
      life: 1.0,
      size: Math.random() * 3.5 + 1.5,
      hue: 220 + Math.random() * 30,
      speed: 0.04 + Math.random() * 0.03,
      trail: []
    });
  }
}

function spawnLightning(x1, y1, x2, y2) {
  const segments = [];
  const steps = 8 + Math.floor(Math.random() * 6);
  let cx = x1, cy = y1;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const tx = x1 + (x2 - x1) * t + (Math.random() - 0.5) * 40;
    const ty = y1 + (y2 - y1) * t + (Math.random() - 0.5) * 30;
    segments.push({ x: i === 0 ? x1 : (i === steps ? x2 : tx), y: i === 0 ? y1 : (i === steps ? y2 : ty) });
  }
  lightningBolts.push({ segments, life: 1.0, hue: 225 + Math.random() * 20 });
}

function spawnSlash() {
  const originX = SPRITE_X + DRAW_W * 0.88;
  const originY = SPRITE_Y + DRAW_H * 0.46;
  const sparks = [];
  for (let i = 0; i < 100; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = Math.random() * 6 + 1.5;
    sparks.push({
      x: originX + (Math.random()-0.5)*30,
      y: originY + (Math.random()-0.5)*60,
      vx: Math.cos(ang) * spd + 4,
      vy: Math.sin(ang) * spd,
      life: 1.0,
      size: Math.random() * 4.5 + 1.5,
      hue: 215 + Math.random()*35,
      trail: []
    });
  }
  slashes.push({ x: originX, y: originY, vx: 11, age: 0, sparks, dead: false });

  // Screen shake
  screenShake.intensity = 12;

  // Flash
  flashAlpha = 0.6;

  // After image
  afterImages.push({ x: SPRITE_X, y: SPRITE_Y, frame: frame, alpha: 0.8, hue: 200 });

  // Ground energy wave
  groundWaves.push({
    x: originX,
    y: SPRITE_Y + DRAW_H * 0.85,
    radius: 10,
    maxRadius: 300,
    alpha: 0.8,
    speed: 8
  });

  // Lightning bolts from slash origin
  for (let i = 0; i < 3; i++) {
    const endX = originX + 100 + Math.random() * 200;
    const endY = originY + (Math.random() - 0.5) * 150;
    spawnLightning(originX, originY, endX, endY);
  }
}

function updateSlashes() {
  for (const s of slashes) {
    s.age += 0.028;
    s.x += s.vx;
    for (const p of s.sparks) {
      p.trail.push({ x: p.x, y: p.y, life: p.life });
      if (p.trail.length > 16) p.trail.shift();
      p.x += p.vx + s.vx * 0.85;
      p.y += p.vy;
      p.vy += 0.035;
      p.life -= 0.013;
    }
    s.sparks = s.sparks.filter(p => p.life > 0);
    if (s.x > canvas.width + 160 || s.age > 1.3) s.dead = true;
  }
  slashes = slashes.filter(s => !s.dead);

  // Screen shake decay
  if (screenShake.intensity > 0) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
    screenShake.intensity *= 0.88;
    if (screenShake.intensity < 0.3) screenShake.intensity = 0;
  }

  // Flash decay
  if (flashAlpha > 0) flashAlpha *= 0.85;

  // Charge particles
  for (const p of chargeParticles) {
    p.trail.push({ x: p.x, y: p.y, life: p.life });
    if (p.trail.length > 10) p.trail.shift();
    p.x += (p.tx - p.x) * p.speed;
    p.y += (p.ty - p.y) * p.speed;
    p.life -= 0.022;
  }
  chargeParticles = chargeParticles.filter(p => p.life > 0);

  // After images
  for (const a of afterImages) {
    a.alpha -= 0.025;
  }
  afterImages = afterImages.filter(a => a.alpha > 0);

  // Ground waves
  for (const w of groundWaves) {
    w.radius += w.speed;
    w.alpha *= 0.96;
  }
  groundWaves = groundWaves.filter(w => w.alpha > 0.01 && w.radius < w.maxRadius);

  // Lightning
  for (const l of lightningBolts) {
    l.life -= 0.06;
  }
  lightningBolts = lightningBolts.filter(l => l.life > 0);

  // Ambient particles
  for (const p of ambientParticles) {
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 8) p.trail.shift();
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.008;
  }
  ambientParticles = ambientParticles.filter(p => p.life > 0);

  // Time distortion
  if (timeDistortion > 0) timeDistortion *= 0.92;
}

function drawLightning() {
  for (const bolt of lightningBolts) {
    const a = bolt.life;
    // Outer glow
    ctx.save();
    ctx.globalAlpha = a * 0.4;
    ctx.strokeStyle = 'hsl(' + bolt.hue + ',100%,70%)';
    ctx.lineWidth = 6;
    ctx.shadowBlur = 20;
    ctx.shadowColor = 'hsl(' + bolt.hue + ',100%,80%)';
    ctx.beginPath();
    ctx.moveTo(bolt.segments[0].x, bolt.segments[0].y);
    for (let i = 1; i < bolt.segments.length; i++) {
      ctx.lineTo(bolt.segments[i].x, bolt.segments[i].y);
    }
    ctx.stroke();
    ctx.restore();

    // Inner bright core
    ctx.save();
    ctx.globalAlpha = a * 0.9;
    ctx.strokeStyle = 'rgba(220,245,255,' + a + ')';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 10;
    ctx.shadowColor = 'white';
    ctx.beginPath();
    ctx.moveTo(bolt.segments[0].x, bolt.segments[0].y);
    for (let i = 1; i < bolt.segments.length; i++) {
      ctx.lineTo(bolt.segments[i].x, bolt.segments[i].y);
    }
    ctx.stroke();
    ctx.restore();
  }
}

function drawGroundWaves() {
  for (const w of groundWaves) {
    ctx.save();
    ctx.globalAlpha = w.alpha * 0.5;
    // Horizontal energy wave
    const grad = ctx.createLinearGradient(w.x - w.radius, w.y, w.x + w.radius, w.y);
    grad.addColorStop(0, 'rgba(10,15,100,0)');
    grad.addColorStop(0.3, 'rgba(25,40,180,' + (w.alpha * 0.6) + ')');
    grad.addColorStop(0.5, 'rgba(80,110,230,' + w.alpha + ')');
    grad.addColorStop(0.7, 'rgba(25,40,180,' + (w.alpha * 0.6) + ')');
    grad.addColorStop(1, 'rgba(10,15,100,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(w.x - w.radius, w.y - 3, w.radius * 2, 6);

    // Vertical energy wisps
    ctx.shadowBlur = 15;
    ctx.shadowColor = 'rgba(30,50,180,0.8)';
    for (let i = 0; i < 8; i++) {
      const wx = w.x - w.radius + Math.random() * w.radius * 2;
      const wh = 10 + Math.random() * 25;
      ctx.globalAlpha = w.alpha * 0.3 * Math.random();
      ctx.fillStyle = 'rgba(50,80,200,0.8)';
      ctx.fillRect(wx - 1, w.y - wh, 2, wh);
    }
    ctx.restore();
  }
}

function drawChargeParticles() {
  ctx.save();
  for (const p of chargeParticles) {
    // Fading trail from dark to light
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const progress = t / p.trail.length;
        const lightness = 12 + progress * 45;
        ctx.globalAlpha = p.life * (0.1 + progress * 0.5);
        ctx.strokeStyle = 'hsl(' + p.hue + ',100%,' + lightness + '%)';
        ctx.lineWidth = p.size * progress * 0.8;
        ctx.beginPath();
        ctx.moveTo(p.trail[t-1].x, p.trail[t-1].y);
        ctx.lineTo(p.trail[t].x, p.trail[t].y);
        ctx.stroke();
      }
    }

    // Bright head
    ctx.globalAlpha = p.life;
    ctx.shadowBlur = 14;
    ctx.shadowColor = 'hsl(' + p.hue + ',100%,55%)';
    ctx.fillStyle = 'hsl(' + p.hue + ',80%,70%)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();

    // Connecting line toward center - deep blue
    ctx.globalAlpha = p.life * 0.15;
    ctx.strokeStyle = 'hsl(' + p.hue + ',100%,25%)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.tx, p.ty);
    ctx.stroke();
  }
  ctx.restore();
}

function drawAmbientParticles() {
  ctx.save();
  for (const p of ambientParticles) {
    // Soft fading trail
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const progress = t / p.trail.length;
        ctx.globalAlpha = p.life * 0.15 * progress;
        ctx.strokeStyle = 'hsl(' + p.hue + ',100%,' + (15 + progress * 35) + '%)';
        ctx.lineWidth = p.size * 0.6;
        ctx.beginPath();
        ctx.moveTo(p.trail[t-1].x, p.trail[t-1].y);
        ctx.lineTo(p.trail[t].x, p.trail[t].y);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = p.life * 0.5;
    ctx.shadowBlur = 10;
    ctx.shadowColor = 'hsl(' + p.hue + ',100%,50%)';
    ctx.fillStyle = 'hsl(' + p.hue + ',80%,65%)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawMoonSlash(s) {
  const cx = s.x;
  const cy = s.y;

  let alpha;
  if (s.age < 0.07) alpha = s.age / 0.07;
  else if (s.age < 0.65) alpha = 1.0;
  else alpha = Math.max(0, 1.0 - (s.age - 0.65) / 0.45);

  const R = 90;
  const innerR = 62;
  const innerOffX = 24;
  const sweep = Math.PI * 0.82;

  ctx.save();
  ctx.translate(cx, cy);

  // Rotation for more dynamic feel
  const rot = Math.sin(s.age * 4) * 0.04;
  ctx.rotate(rot);

  // Massive outer energy field - deep indigo
  const fieldR = R + 90;
  const fieldGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, fieldR);
  fieldGrad.addColorStop(0.0, 'rgba(60,80,220,' + (alpha * 0.2) + ')');
  fieldGrad.addColorStop(0.2, 'rgba(30,40,180,' + (alpha * 0.15) + ')');
  fieldGrad.addColorStop(0.5, 'rgba(15,20,120,' + (alpha * 0.08) + ')');
  fieldGrad.addColorStop(1.0, 'rgba(5,5,60,0)');
  ctx.fillStyle = fieldGrad;
  ctx.beginPath(); ctx.arc(0, 0, fieldR, 0, Math.PI*2); ctx.fill();

  // Soft outer glow - deep blue core fading lighter
  const glowR = R + 55;
  const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
  glowGrad.addColorStop(0.0, 'rgba(40,60,200,' + (alpha * 0.3) + ')');
  glowGrad.addColorStop(0.3, 'rgba(20,40,160,' + (alpha * 0.2) + ')');
  glowGrad.addColorStop(0.7, 'rgba(80,120,220,' + (alpha * 0.1) + ')');
  glowGrad.addColorStop(1.0, 'rgba(120,160,255,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(0, 0, glowR, 0, Math.PI*2); ctx.fill();

  // Crescent fill - 4 layered passes for richer look
  for (let pass = 3; pass >= 0; pass--) {
    const expand = pass * 10;
    const passAlpha = [0.4, 0.55, 0.7, 0.95][pass] * alpha;
    const passBlur = [40, 28, 16, 5][pass];
    ctx.save();
    ctx.shadowBlur = passBlur;
    ctx.shadowColor = 'rgba(30,50,180,1)';
    ctx.globalAlpha = passAlpha;
    const fillGrad = ctx.createLinearGradient(-(R+expand), 0, R+expand, 0);
    fillGrad.addColorStop(0.0, 'rgba(5,10,80,0.0)');
    fillGrad.addColorStop(0.15, 'rgba(15,25,140,0.4)');
    fillGrad.addColorStop(0.35, 'rgba(30,50,200,0.7)');
    fillGrad.addColorStop(0.55, 'rgba(60,90,230,0.9)');
    fillGrad.addColorStop(0.75, 'rgba(120,160,255,0.95)');
    fillGrad.addColorStop(0.9, 'rgba(180,210,255,1.0)');
    fillGrad.addColorStop(1.0, 'rgba(200,225,255,0.6)');
    ctx.fillStyle = fillGrad;
    ctx.beginPath();
    ctx.arc(0, 0, R + expand, -sweep, sweep, false);
    ctx.arc(-innerOffX, 0, innerR + expand*0.5, sweep, -sweep, true);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Pulsing energy ring around the slash
  const pulseR = R + 15 + Math.sin(s.age * 20) * 8;
  ctx.save();
  ctx.globalAlpha = alpha * 0.3;
  ctx.strokeStyle = 'rgba(50,80,220,0.6)';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 12;
  ctx.shadowColor = 'rgba(30,50,180,0.8)';
  ctx.beginPath();
  ctx.arc(0, 0, pulseR, -sweep * 0.9, sweep * 0.9);
  ctx.stroke();
  ctx.restore();

  // Sharp outer rim with double stroke
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowBlur = 18;
  ctx.shadowColor = 'rgba(80,120,255,1)';
  ctx.strokeStyle = 'rgba(140,170,255,0.98)';
  ctx.lineWidth = 3.2;
  ctx.beginPath(); ctx.arc(0, 0, R, -sweep, sweep, false); ctx.stroke();
  // Second thinner rim - lighter fade
  ctx.strokeStyle = 'rgba(180,200,255,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, 0, R + 4, -sweep, sweep, false); ctx.stroke();
  ctx.restore();

  // Inner concave edge
  ctx.save();
  ctx.globalAlpha = alpha * 0.65;
  ctx.shadowBlur = 8;
  ctx.shadowColor = 'rgba(30,50,180,1)';
  ctx.strokeStyle = 'rgba(70,100,220,0.85)';
  ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.arc(-innerOffX, 0, innerR, -sweep, sweep, false); ctx.stroke();
  ctx.restore();

  // Bright tip points with starburst
  const tipX = Math.cos(sweep) * R;
  const tipY = Math.sin(sweep) * R;
  for (let tip = 0; tip < 2; tip++) {
    const ty = tip === 0 ? -tipY : tipY;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 28; ctx.shadowColor = 'rgba(100,140,255,1)';
    ctx.fillStyle = 'rgba(160,185,255,0.98)';
    ctx.beginPath(); ctx.arc(tipX, ty, 5, 0, Math.PI*2); ctx.fill();

    // Starburst rays from tips
    ctx.globalAlpha = alpha * 0.5;
    ctx.strokeStyle = 'rgba(80,120,240,0.7)';
    ctx.lineWidth = 1;
    for (let r = 0; r < 6; r++) {
      const rayAng = (r / 6) * Math.PI * 2 + s.age * 3;
      const rayLen = 12 + Math.sin(s.age * 10 + r) * 5;
      ctx.beginPath();
      ctx.moveTo(tipX, ty);
      ctx.lineTo(tipX + Math.cos(rayAng) * rayLen, ty + Math.sin(rayAng) * rayLen);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Speed smear trail (enhanced with more layers)
  ctx.save();
  for (let i = 1; i <= 8; i++) {
    const smearX = -i * 30;
    const smearAlpha = (1 - i/9) * alpha * 0.3;
    ctx.globalAlpha = smearAlpha;
    ctx.shadowBlur = 12;
    ctx.shadowColor = 'rgba(20,40,160,0.8)';
    const smearGrad = ctx.createLinearGradient(smearX-20, 0, smearX+R*0.6, 0);
    smearGrad.addColorStop(0, 'rgba(5,10,100,0)');
    smearGrad.addColorStop(0.5, 'rgba(20,40,160,' + smearAlpha * 0.8 + ')');
    smearGrad.addColorStop(1, 'rgba(80,120,220,' + smearAlpha + ')');
    ctx.fillStyle = smearGrad;
    ctx.beginPath();
    ctx.arc(smearX, 0, R*(1-i*0.05), -Math.PI*0.45, Math.PI*0.45);
    ctx.arc(smearX-innerOffX, 0, innerR*(1-i*0.04), Math.PI*0.45, -Math.PI*0.45, true);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  ctx.restore();

  // Enhanced sparkles with deep-to-light fading trails
  ctx.save();
  for (const p of s.sparks) {
    const pa = p.life * alpha;
    if (pa < 0.01) continue;

    // Long fading trail: deep dark blue at tail -> lighter at head
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const trailProgress = t / p.trail.length; // 0=old/dark, 1=new/light
        const trailAlpha = pa * (0.05 + trailProgress * 0.5);
        const lightness = 15 + trailProgress * 50; // 15% (very dark) -> 65% (lighter)
        const saturation = 100;
        ctx.globalAlpha = trailAlpha;
        ctx.strokeStyle = 'hsl(' + p.hue + ',' + saturation + '%,' + lightness + '%)';
        ctx.lineWidth = p.size * (0.3 + trailProgress * 0.8);
        ctx.shadowBlur = trailProgress * 8;
        ctx.shadowColor = 'hsl(' + p.hue + ',100%,' + (lightness + 10) + '%)';
        ctx.beginPath();
        ctx.moveTo(p.trail[t-1].x, p.trail[t-1].y);
        ctx.lineTo(p.trail[t].x, p.trail[t].y);
        ctx.stroke();
      }
      // Final segment: trail end to current position (brightest)
      const lastT = p.trail[p.trail.length - 1];
      ctx.globalAlpha = pa * 0.7;
      ctx.strokeStyle = 'hsl(' + p.hue + ',90%,70%)';
      ctx.lineWidth = p.size * 1.1;
      ctx.shadowBlur = 10;
      ctx.shadowColor = 'hsl(' + p.hue + ',100%,75%)';
      ctx.beginPath();
      ctx.moveTo(lastT.x, lastT.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }

    // Bright particle head
    ctx.globalAlpha = pa;
    ctx.shadowBlur = 16;
    ctx.shadowColor = 'hsl(' + p.hue + ',100%,60%)';
    ctx.fillStyle = 'hsl(' + p.hue + ',80%,75%)';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 0.9, 0, Math.PI*2); ctx.fill();

    // Inner bright core
    ctx.fillStyle = 'hsl(' + p.hue + ',50%,90%)';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 0.4, 0, Math.PI*2); ctx.fill();

    // Cross-shaped sparkle - lighter blue
    ctx.fillStyle = 'rgba(150,180,255,' + pa * 0.6 + ')';
    ctx.fillRect(p.x - p.size*2.5, p.y - p.size*0.25, p.size*5, p.size*0.5);
    ctx.fillRect(p.x - p.size*0.25, p.y - p.size*2.5, p.size*0.5, p.size*5);
  }
  ctx.restore();
}

function drawAfterImages() {
  if (!img.complete || img.naturalWidth === 0) return;
  for (const a of afterImages) {
    ctx.save();
    ctx.globalAlpha = a.alpha * 0.4;
    ctx.globalCompositeOperation = 'screen';
    // Tint with blue
    ctx.filter = 'hue-rotate(' + (a.hue - 30) + 'deg) brightness(1.5) saturate(2)';
    ctx.drawImage(offscreen, a.frame * SPRITE_W, 0, SPRITE_W, SPRITE_H, a.x - 3, a.y, DRAW_W, DRAW_H);
    ctx.restore();
  }
}

function drawVignette() {
  const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height * 0.4,
                                         canvas.width/2, canvas.height/2, canvas.height * 0.9);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,15,0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function draw(ts) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Dark background with subtle gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bgGrad.addColorStop(0, '#06061a');
  bgGrad.addColorStop(1, '#020208');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  updateSlashes();
  if (playing && Math.random() < 0.3) spawnAmbientParticles();

  // Apply screen shake
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  // Vignette
  drawVignette();

  // Ambient particles (behind everything)
  drawAmbientParticles();

  // Charge particles
  drawChargeParticles();

  // Ground energy waves
  drawGroundWaves();

  // After images
  drawAfterImages();

  // Draw sprite
  if (img.complete && img.naturalWidth > 0) {
    ctx.save();
    ctx.imageSmoothingEnabled = false;

    // Character energy aura when charging (frames 2-4)
    if (playing && frame >= 2 && frame <= 4) {
      ctx.save();
      ctx.globalAlpha = 0.15 + Math.sin(ts * 0.01) * 0.05;
      ctx.shadowBlur = 30;
      ctx.shadowColor = 'rgba(30,50,200,0.8)';
      ctx.globalCompositeOperation = 'lighten';
      ctx.drawImage(offscreen, frame * SPRITE_W, 0, SPRITE_W, SPRITE_H,
        SPRITE_X - 4, SPRITE_Y - 4, DRAW_W + 8, DRAW_H + 8);
      ctx.restore();
    }

    ctx.globalCompositeOperation = 'lighten';
    ctx.drawImage(offscreen, frame * SPRITE_W, 0, SPRITE_W, SPRITE_H, SPRITE_X, SPRITE_Y, DRAW_W, DRAW_H);
    ctx.restore();
  }

  // Lightning
  drawLightning();

  // Slashes on top
  for (const s of slashes) drawMoonSlash(s);

  // Screen flash overlay
  if (flashAlpha > 0.01) {
    ctx.save();
    ctx.globalAlpha = flashAlpha;
    const flashGrad = ctx.createRadialGradient(SPRITE_X + DRAW_W * 0.88, SPRITE_Y + DRAW_H * 0.46, 0,
                                                SPRITE_X + DRAW_W * 0.88, SPRITE_Y + DRAW_H * 0.46, 500);
    flashGrad.addColorStop(0, 'rgba(100,130,255,1)');
    flashGrad.addColorStop(0.3, 'rgba(30,50,200,0.5)');
    flashGrad.addColorStop(1, 'rgba(5,10,80,0)');
    ctx.fillStyle = flashGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  }

  ctx.restore(); // end screen shake

  if (playing) {
    const interval = 1000 / fps;
    if (ts - lastTime > interval) {
      lastTime = ts;
      frame++;

      // Charge effect on wind-up frames
      if (frame === 2) spawnChargeEffect();
      if (frame === 3) {
        spawnChargeEffect();
        // More after images during wind-up
        afterImages.push({ x: SPRITE_X + 2, y: SPRITE_Y, frame: frame, alpha: 0.5, hue: 220 });
      }

      // Slash on attack frame
      if (frame === FRAME_COUNT - 2) {
        spawnSlash();
        timeDistortion = 1;
      }

      if (frame >= FRAME_COUNT) {
        if (looping) { frame = 0; slashes = []; chargeParticles = []; afterImages = []; groundWaves = []; lightningBolts = []; }
        else { frame = FRAME_COUNT - 1; playing = false; document.getElementById('btnPlay').textContent = '\u25B6 PLAY'; }
      }
    }
  }
  requestAnimationFrame(draw);
}

document.getElementById('btnPlay').addEventListener('click', () => {
  if (!playing) {
    playing = true; frame = 0; slashes = []; chargeParticles = []; afterImages = []; groundWaves = []; lightningBolts = []; lastTime = 0;
    document.getElementById('btnPlay').textContent = '\u25A0 STOP';
  } else {
    playing = false; frame = 0; slashes = []; chargeParticles = []; afterImages = []; groundWaves = []; lightningBolts = [];
    document.getElementById('btnPlay').textContent = '\u25B6 PLAY';
  }
});
document.getElementById('btnLoop').addEventListener('click', function() {
  looping = !looping;
  this.textContent = '\u27F3 LOOP: ' + (looping ? 'ON' : 'OFF');
});
document.getElementById('speed').addEventListener('input', function() {
  fps = parseInt(this.value);
});

requestAnimationFrame(draw);
</script>
</body>
</html>
