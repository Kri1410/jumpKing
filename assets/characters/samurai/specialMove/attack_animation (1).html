const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const FRAME_COUNT = 7;
const SPRITE_W = 110;
const SPRITE_H = 128;
const SCALE = 1.5;
const DRAW_W = SPRITE_W * SCALE;
const DRAW_H = SPRITE_H * SCALE;
const SPRITE_X = 30;
const SPRITE_Y = (canvas.height - DRAW_H) / 2;

let frame = 0;
let playing = false;
let looping = true;
let fps = 8;
let lastTime = 0;
let slashes = [];

// Offscreen canvas to strip black background from sprite
const offscreen = document.createElement('canvas');
offscreen.width = 768;
offscreen.height = 128;
const offCtx = offscreen.getContext('2d');

const img = new Image();
img.src = SPRITE_DATA;
img.onload = () => {
  // Draw sprite sheet onto offscreen canvas
  offCtx.drawImage(img, 0, 0);
  // Get pixel data and make near-black pixels transparent
  const imageData = offCtx.getImageData(0, 0, 768, 128);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    // If pixel is very dark (black background), make transparent
    if (r < 30 && g < 30 && b < 30) {
      data[i+3] = 0;
    } else if (r < 60 && g < 60 && b < 60) {
      // Semi-transparent edge pixels for smooth cutout
      const brightness = Math.max(r, g, b);
      data[i+3] = Math.floor((brightness / 60) * 255);
    }
  }
  offCtx.putImageData(imageData, 0, 0);
};

function spawnSlash() {
  const originX = SPRITE_X + DRAW_W * 0.88;
  const originY = SPRITE_Y + DRAW_H * 0.46;
  const sparks = [];
  for (let i = 0; i < 42; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = Math.random() * 3.5 + 0.8;
    sparks.push({
      x: originX + (Math.random()-0.5)*30,
      y: originY + (Math.random()-0.5)*60,
      vx: Math.cos(ang) * spd + 2.5,
      vy: Math.sin(ang) * spd,
      life: 1.0,
      size: Math.random() * 3 + 1.2,
      hue: 190 + Math.random()*30
    });
  }
  slashes.push({ x: originX, y: originY, vx: 9.5, age: 0, sparks, dead: false });
}

function updateSlashes() {
  for (const s of slashes) {
    s.age += 0.028;
    s.x += s.vx;
    for (const p of s.sparks) {
      p.x += p.vx + s.vx * 0.85;
      p.y += p.vy;
      p.vy += 0.04;
      p.life -= 0.022;
    }
    s.sparks = s.sparks.filter(p => p.life > 0);
    if (s.x > canvas.width + 160 || s.age > 1.1) s.dead = true;
  }
  slashes = slashes.filter(s => !s.dead);
}

function drawMoonSlash(s) {
  const cx = s.x;
  const cy = s.y;

  let alpha;
  if (s.age < 0.07) alpha = s.age / 0.07;
  else if (s.age < 0.65) alpha = 1.0;
  else alpha = Math.max(0, 1.0 - (s.age - 0.65) / 0.35);

  const R = 82;
  const innerR = 58;
  const innerOffX = 22;
  const sweep = Math.PI * 0.78;

  ctx.save();
  ctx.translate(cx, cy);

  // Big soft outer glow
  const glowR = R + 45;
  const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
  glowGrad.addColorStop(0.0, 'rgba(80,180,255,' + (alpha * 0.22) + ')');
  glowGrad.addColorStop(0.4, 'rgba(40,140,255,' + (alpha * 0.14) + ')');
  glowGrad.addColorStop(1.0, 'rgba(0,80,200,0)');
  ctx.save();
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(0, 0, glowR, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Crescent fill - 3 layered passes
  for (let pass = 2; pass >= 0; pass--) {
    const expand = pass * 10;
    const passAlpha = [0.55, 0.7, 0.9][pass] * alpha;
    const passBlur = [35, 18, 6][pass];
    ctx.save();
    ctx.shadowBlur = passBlur;
    ctx.shadowColor = 'rgba(100,200,255,1)';
    ctx.globalAlpha = passAlpha;
    const fillGrad = ctx.createLinearGradient(-(R+expand), 0, R+expand, 0);
    fillGrad.addColorStop(0.0, 'rgba(0,80,200,0.0)');
    fillGrad.addColorStop(0.3, 'rgba(40,160,255,0.7)');
    fillGrad.addColorStop(0.65, 'rgba(160,230,255,0.95)');
    fillGrad.addColorStop(0.85, 'rgba(220,248,255,1.0)');
    fillGrad.addColorStop(1.0, 'rgba(180,235,255,0.5)');
    ctx.fillStyle = fillGrad;
    ctx.beginPath();
    ctx.arc(0, 0, R + expand, -sweep, sweep, false);
    ctx.arc(-innerOffX, 0, innerR + expand*0.5, sweep, -sweep, true);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Sharp outer rim
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowBlur = 14;
  ctx.shadowColor = 'rgba(200,245,255,1)';
  ctx.strokeStyle = 'rgba(230,252,255,0.98)';
  ctx.lineWidth = 2.8;
  ctx.beginPath(); ctx.arc(0, 0, R, -sweep, sweep, false); ctx.stroke();
  ctx.restore();

  // Inner concave edge
  ctx.save();
  ctx.globalAlpha = alpha * 0.65;
  ctx.shadowBlur = 8;
  ctx.shadowColor = 'rgba(100,200,255,1)';
  ctx.strokeStyle = 'rgba(160,225,255,0.85)';
  ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.arc(-innerOffX, 0, innerR, -sweep, sweep, false); ctx.stroke();
  ctx.restore();

  // Bright tip points
  const tipX = Math.cos(sweep) * R;
  const tipY = Math.sin(sweep) * R;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowBlur = 22; ctx.shadowColor = 'white';
  ctx.fillStyle = 'rgba(255,255,255,0.98)';
  ctx.beginPath(); ctx.arc(tipX, -tipY, 4.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(tipX,  tipY, 4.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Speed smear trail
  ctx.save();
  for (let i = 1; i <= 6; i++) {
    const smearX = -i * 28;
    const smearAlpha = (1 - i/7) * alpha * 0.28;
    ctx.globalAlpha = smearAlpha;
    ctx.shadowBlur = 10;
    ctx.shadowColor = 'rgba(60,170,255,0.8)';
    const smearGrad = ctx.createLinearGradient(smearX-20, 0, smearX+R*0.6, 0);
    smearGrad.addColorStop(0, 'rgba(0,100,220,0)');
    smearGrad.addColorStop(1, 'rgba(100,200,255,' + smearAlpha + ')');
    ctx.fillStyle = smearGrad;
    ctx.beginPath();
    ctx.arc(smearX, 0, R*(1-i*0.06), -Math.PI*0.45, Math.PI*0.45);
    ctx.arc(smearX-innerOffX, 0, innerR*(1-i*0.05), Math.PI*0.45, -Math.PI*0.45, true);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  ctx.restore();

  // Sparkles
  ctx.save();
  for (const p of s.sparks) {
    const pa = p.life * alpha;
    if (pa < 0.01) continue;
    ctx.globalAlpha = pa;
    ctx.shadowBlur = 10;
    ctx.shadowColor = 'hsl(' + p.hue + ',100%,75%)';
    ctx.fillStyle = 'hsl(' + p.hue + ',100%,85%)';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(220,248,255,' + pa + ')';
    ctx.fillRect(p.x - p.size*2, p.y - p.size*0.35, p.size*4, p.size*0.7);
    ctx.fillRect(p.x - p.size*0.35, p.y - p.size*2, p.size*0.7, p.size*4);
  }
  ctx.restore();
}

function draw(ts) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  updateSlashes();
  for (const s of slashes) drawMoonSlash(s);

  // Draw sprite using 'screen' blend mode to knock out black background
  if (img.complete && img.naturalWidth > 0) {
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    // Use 'lighten' composite: black (0,0,0) becomes invisible, colored pixels show through
    ctx.globalCompositeOperation = 'lighten';
    ctx.drawImage(offscreen, frame * SPRITE_W, 0, SPRITE_W, SPRITE_H, SPRITE_X, SPRITE_Y, DRAW_W, DRAW_H);
    ctx.restore();
  }

  if (playing) {
    const interval = 1000 / fps;
    if (ts - lastTime > interval) {
      lastTime = ts;
      frame++;
      if (frame === FRAME_COUNT - 2) spawnSlash();
      if (frame >= FRAME_COUNT) {
        if (looping) { frame = 0; slashes = []; }
        else { frame = FRAME_COUNT - 1; playing = false; document.getElementById('btnPlay').textContent = '\u25B6 PLAY'; }
      }
    }
  }
  requestAnimationFrame(draw);
}

document.getElementById('btnPlay').addEventListener('click', () => {
  if (!playing) {
    playing = true; frame = 0; slashes = []; lastTime = 0;
    document.getElementById('btnPlay').textContent = '\u25A0 STOP';
  } else {
    playing = false; frame = 0; slashes = [];
    document.getElementById('btnPlay').textContent = '\u25B6 PLAY';
  }
});
document.getElementById('btnLoop').addEventListener('click', function() {
  looping = !looping;
  this.textContent = '\u27F3 LOOP: ' + (looping ? 'ON' : 'OFF');
});
document.getElementById('speed').addEventListener('input', function() {
  fps = parseInt(this.value);
});

requestAnimationFrame(draw);
</script>
