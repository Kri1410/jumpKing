<title>Jump Attack - Ground Spears</title>
<style>

</style>

function triggerImpact() {
  const cx = CHAR_X + DRAW_W / 2;
  const cy = GROUND_Y;

  shockwave = { x: cx, y: cy, age: 0 };

  for (let i = 0; i < 35; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = Math.random() * 5 + 2;
    impactParticles.push({
      x: cx + (Math.random()-0.5)*20, y: cy,
      vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 4,
      life: 1.0, size: Math.random()*3+1, hue: 190+Math.random()*30
    });
  }

  // Ring of spears + some random extras
  for (let i = 0; i < 12; i++) {
    const ang = (i / 12) * Math.PI * 2 + (Math.random()-0.5)*0.4;
    const dist = 55 + Math.random()*80;
    spears.push({
      x: cx + Math.cos(ang)*dist,
      groundY: cy,
      height: 75 + Math.random()*65,
      tilt: (Math.random()-0.5)*0.4,
      delay: i * 0.035 + Math.random()*0.04,
      age: 0,
      life: 1.0,
      width: 9 + Math.random()*7,
      sparks: []
    });
  }
}

function updateAll() {
  if (shockwave) {
    shockwave.age += 0.045;
    if (shockwave.age >= 1) shockwave = null;
  }
  for (const p of impactParticles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life -= 0.03;
  }
  impactParticles = impactParticles.filter(p => p.life > 0);

  for (const s of spears) {
    s.age += 0.05;
    const activeAge = s.age - s.delay;
    if (activeAge < 0) continue;
    if (activeAge < 0.45 && Math.random() < 0.5) {
      const ang = Math.random()*Math.PI*2;
      const spd = Math.random()*3+1;
      s.sparks.push({
        x: s.x, y: s.groundY - s.height * Math.min(activeAge/0.35, 1),
        vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2,
        life: 1.0, size: Math.random()*2.5+0.8, hue: 190+Math.random()*30
      });
    }
    for (const p of s.sparks) {
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.04;
    }
    s.sparks = s.sparks.filter(p=>p.life>0);
    if (activeAge > 0.5) s.life = Math.max(0, 1-(activeAge-0.5)/0.8);
  }
  spears = spears.filter(s => s.life > 0 || (s.age - s.delay) < 0);
}

function drawSpear(s) {
  const activeAge = s.age - s.delay;
  if (activeAge < 0) return;
  const progress = Math.min(activeAge / 0.35, 1.0);
  const alpha = s.life;
  if (alpha <= 0.01) return;

  const currentH = s.height * progress;
  const w = s.width;

  ctx.save();
  ctx.translate(s.x, s.groundY);
  ctx.rotate(s.tilt);

  // Ground crack glow
  ctx.save();
  ctx.globalAlpha = alpha * progress * 0.8;
  ctx.shadowBlur = 20;
  ctx.shadowColor = 'rgba(80,180,255,1)';
  const cg = ctx.createRadialGradient(0,0,0, 0,0, w*3);
  cg.addColorStop(0,'rgba(180,230,255,0.9)');
  cg.addColorStop(1,'rgba(0,100,220,0)');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.ellipse(0,0, w*3, w, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Outer glow body
  ctx.save();
  ctx.globalAlpha = alpha * 0.5;
  ctx.shadowBlur = 28;
  ctx.shadowColor = 'rgba(60,170,255,1)';
  const og = ctx.createLinearGradient(0,0,0,-currentH);
  og.addColorStop(0,'rgba(0,100,220,0.3)');
  og.addColorStop(0.5,'rgba(60,170,255,0.6)');
  og.addColorStop(1,'rgba(160,220,255,0.2)');
  ctx.fillStyle = og;
  ctx.beginPath();
  ctx.moveTo(-w*2, 0);
  ctx.lineTo(-w*0.4, -currentH+10);
  ctx.lineTo(0, -currentH);
  ctx.lineTo(w*0.4, -currentH+10);
  ctx.lineTo(w*2, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Main spear body
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowBlur = 14;
  ctx.shadowColor = 'rgba(120,210,255,1)';
  const bg = ctx.createLinearGradient(-w*0.5,0, w*0.5,0);
  bg.addColorStop(0,   'rgba(20,110,210,0.7)');
  bg.addColorStop(0.3, 'rgba(70,180,255,0.95)');
  bg.addColorStop(0.5, 'rgba(210,245,255,1.0)');
  bg.addColorStop(0.7, 'rgba(70,180,255,0.95)');
  bg.addColorStop(1,   'rgba(20,110,210,0.7)');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.moveTo(-w*0.5, 0);
  ctx.lineTo(-w*0.18, -currentH*0.88);
  ctx.lineTo(0, -currentH);
  ctx.lineTo(w*0.18, -currentH*0.88);
  ctx.lineTo(w*0.5, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Hot core line
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowBlur = 8;
  ctx.shadowColor = 'white';
  ctx.strokeStyle = 'rgba(240,252,255,0.95)';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(0, -4);
  ctx.lineTo(0, -currentH);
  ctx.stroke();
  ctx.restore();

  // Tip glow
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowBlur = 22;
  ctx.shadowColor = 'white';
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(0, -currentH, 3.5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  ctx.restore();

  // Sparks
  ctx.save();
  for (const p of s.sparks) {
    const pa = p.life * alpha;
    if (pa < 0.02) continue;
    ctx.globalAlpha = pa;
    ctx.shadowBlur = 8;
    ctx.shadowColor = 'hsl('+p.hue+',100%,75%)';
    ctx.fillStyle = 'hsl('+p.hue+',100%,88%)';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(200,245,255,'+pa+')';
    ctx.fillRect(p.x-p.size*2.5, p.y-p.size*0.4, p.size*5, p.size*0.8);
    ctx.fillRect(p.x-p.size*0.4, p.y-p.size*2.5, p.size*0.8, p.size*5);
  }
  ctx.restore();
}

function drawShockwave() {
  if (!shockwave) return;
  const { x, y, age } = shockwave;
  const maxR = 190;
  const r = maxR * Math.pow(age, 0.45);
  const alpha = Math.max(0, 1 - age);
  ctx.save();
  ctx.globalAlpha = alpha * 0.6;
  ctx.shadowBlur = 18;
  ctx.shadowColor = 'rgba(80,180,255,1)';
  ctx.strokeStyle = 'rgba(160,225,255,'+alpha+')';
  ctx.lineWidth = 3 + age * 3;
  ctx.beginPath();
  ctx.ellipse(x, y, r, r*0.25, 0, 0, Math.PI*2);
  ctx.stroke();
  ctx.globalAlpha = alpha * 0.25;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(x, y, r*0.55, r*0.14, 0, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function drawGroundGlow() {
  if (!hasTriggered) return;
  const cx = CHAR_X + DRAW_W/2;
  const maxLife = spears.length ? Math.max(...spears.map(s=>s.life)) : 0;
  const swA = shockwave ? (1-shockwave.age)*0.35 : 0;
  const a = Math.max(swA, maxLife*0.25);
  if (a < 0.01) return;
  ctx.save();
  ctx.globalAlpha = a;
  const gg = ctx.createRadialGradient(cx,GROUND_Y,0, cx,GROUND_Y,170);
  gg.addColorStop(0,'rgba(100,200,255,0.55)');
  gg.addColorStop(1,'rgba(0,80,200,0)');
  ctx.fillStyle = gg;
  ctx.beginPath();
  ctx.ellipse(cx, GROUND_Y, 170, 32, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function draw(ts) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground line
  ctx.save();
  ctx.strokeStyle = '#1e2a3a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(canvas.width, GROUND_Y);
  ctx.stroke();
  ctx.restore();

  updateAll();
  drawGroundGlow();
  drawShockwave();

  // Draw spears behind character
  for (const s of spears) drawSpear(s);

  // Impact particles
  ctx.save();
  for (const p of impactParticles) {
    ctx.globalAlpha = p.life;
    ctx.shadowBlur = 8;
    ctx.shadowColor = 'hsl(200,100%,70%)';
    ctx.fillStyle = 'hsl(200,100%,85%)';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Draw character — transparent PNG, no blend mode needed
  if (img.complete && img.naturalWidth > 0) {
    const jumpY = getJumpOffsetY(frame);
    const charY = GROUND_Y - DRAW_H + jumpY;
    ctx.drawImage(img, frame * SPRITE_W, 0, SPRITE_W, SPRITE_H, CHAR_X, charY, DRAW_W, DRAW_H);
  }

  if (playing) {
    const interval = 1000 / fps;
    if (ts - lastTime > interval) {
      lastTime = ts;
      frame++;
      if (frame === 11 && !hasTriggered) {
        hasTriggered = true;
        triggerImpact();
      }
      if (frame >= FRAME_COUNT) {
        if (looping) {
          frame = 0; hasTriggered = false;
          spears = []; shockwave = null; impactParticles = [];
        } else {
          frame = FRAME_COUNT-1; playing = false;
          document.getElementById('btnPlay').textContent = '\u25B6 PLAY';
        }
      }
    }
  }
  requestAnimationFrame(draw);
}

document.getElementById('btnPlay').addEventListener('click', () => {
  if (!playing) {
    playing = true; frame = 0; hasTriggered = false;
    spears = []; shockwave = null; impactParticles = []; lastTime = 0;
    document.getElementById('btnPlay').textContent = '\u25A0 STOP';
  } else {
    playing = false; frame = 0; hasTriggered = false;
    spears = []; shockwave = null; impactParticles = [];
    document.getElementById('btnPlay').textContent = '\u25B6 PLAY';
  }
});
document.getElementById('btnLoop').addEventListener('click', function() {
  looping = !looping;
  this.textContent = '\u27F3 LOOP: '+(looping?'ON':'OFF');
});
document.getElementById('speed').addEventListener('input', function() {
  fps = parseInt(this.value);
});

requestAnimationFrame(draw);
</script>
</body>
</html>
