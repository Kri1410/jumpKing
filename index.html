<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jump King Prototype</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="title-block">
          <h1>A Warriors climb</h1>
        </div>
        <div class="status-tools">
          <div class="stats">
            <span id="status-label">Ready</span>
            <span id="height-label">Height 0 m</span>
          </div>
          <label class="character-picker" for="character-select">
            <span>Character</span>
            <select id="character-select" aria-label="Choose character"></select>
          </label>
        </div>
      </header>

      <section class="stage-frame">
        <canvas id="game" width="960" height="540" tabindex="0" aria-label="Jump King prototype canvas"></canvas>
        <div class="control-bar">
          <span>Hold Space to charge jump</span>
          <span>A/D or arrows to move</span>
          <span>Shift to dash (Samurai)</span>
          <span>Left click attack</span>
          <span>Right click block</span>
          <span>Base floor door leads to boss arena</span>
          <span>After boss + bell, go right to enter the forest</span>
          <span>Forest bonfire heals and saves checkpoint</span>
          <span>R to restart</span>
        </div>
      </section>
    </main>
    <script type="module" src="src/game.js"></script>
  </body>
</html>
